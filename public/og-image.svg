<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#05060a"/>
      <stop offset="55%" stop-color="#10131d"/>
      <stop offset="100%" stop-color="#161a27"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#00e0ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="45" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1010" cy="90" r="230" fill="#00e0ff" opacity="0.13" filter="url(#glow)"/>
  <circle cx="220" cy="560" r="300" fill="#7c5cff" opacity="0.22" filter="url(#glow)"/>

  <g opacity="0.12">
    <path d="M0 120 H1200 M0 240 H1200 M0 360 H1200 M0 480 H1200" stroke="#fff"/>
    <path d="M120 0 V630 M240 0 V630 M360 0 V630 M480 0 V630 M600 0 V630 M720 0 V630 M840 0 V630 M960 0 V630 M1080 0 V630" stroke="#fff"/>
  </g>

  <rect x="72" y="72" width="1056" height="486" rx="36" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)"/>
  <rect x="104" y="108" width="88" height="88" rx="22" fill="url(#accent)"/>
  <text x="148" y="165" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#05060a">DP</text>

  <text x="104" y="270" font-family="Space Grotesk, Inter, Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff">Dedy Priyatna</text>
  <text x="104" y="335" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="600" fill="#c5b6ff">Engineering Lead Ę Full-Stack Architect</text>
  <text x="104" y="405" font-family="Inter, Arial, sans-serif" font-size="28" fill="rgba(255,255,255,0.72)">Building scalable products, resilient teams, and software that ships.</text>

  <rect x="104" y="468" width="214" height="44" rx="22" fill="rgba(124,92,255,0.18)" stroke="rgba(124,92,255,0.45)"/>
  <circle cx="130" cy="490" r="6" fill="#34d399"/>
  <text x="148" y="498" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff">Open to opportunities</text>
</svg>
